unbindall

//
// KEYBOARD BINDINGS
//

// movement

bind w "+forward"
bind s "+back"
bind a "+moveleft"
bind d "+moveright"

bind SPACE "+moveup"
bind CTRL "+speed" // walk
bind SHIFT "+movedown" // crouch

// interactions

bind MOUSE1 "+attack"
bind e "weapnext"
// bind g "+button3"
bind q "weapprev"
bind f "+button2" // use item
bind 0 "weapon 10"
bind MWHEELUP "weapon 1" // gauntlet
bind MWHEELDOWN "weapon 2" // machinegun
bind 2 "weapon 3" // shotgun
// bind 2 "weapon 4" // granade launcher
bind 3 "weapon 5" // rocket launcher
bind 4 "weapon 6" // lightning gun
bind 5 "weapon 7" // railgun
// bind 5 "weapon 8" // plasma gun
bind 1 "weapon 8; weapon 9;" // plasma gun or BFG?
// bind 9 "weapon 9"

seta cg_autoswitch "0"

// looking

bind MOUSE2 "+zoom"
bind MOUSE3 "+zoom"
bind c "+zoom"

// mouse
seta sensitivity "8.3"
seta cl_mouseAccel "0"
seta m_yaw "0.022"
seta m_pitch "0.022000"
seta m_filter "1" // mouse smoothing
seta cl_freelook "1"
seta cl_mouseAccelStyle "0"
seta cl_mouseAccelOffset "5"
seta cg_oversampleMouse "0"

// ui

bind ` "toggleconsole"
bind ~ "toggleconsole"
bind TAB "+scores"
bind ESCAPE "togglemenu"

bind t "messagemode"
bind u "messagemode2" // team chat
bind F3 "ui_teamorders"
bind y "vote yes"
bind n "vote no"
bind F11 "screenshot"
bind UPARROW "ready"
bind DOWNARROW "notready"
bind LEFTARROW "team red"
bind RIGHTARROW "team blue"
bind PAUSE "pause"

// chat, fun things

bind g "say gl;hf"
bind p "say a ty farcie pierdolony!!!" // no offense, https://www.youtube.com/watch?v=5evHAdfD6J0 reference
bind b "currenttime"
set ntk "connect q3a.nietaki.com:27960" // \vstr ntk in console to connect to the server

//
// SETTINGS TOGGLES
//

// info display
seta cg_drawFPS "1"
bind 6 "toggle cg_drawFPS"
seta ch_drawSpeed "0"
bind 7 "toggle ch_drawSpeed"
seta cg_lagometer "1"
bind 8 "toggle cg_lagometer"


//
// CONNECTION SETTINGS
//

seta rate "25000"
seta cl_maxpackets "30"
seta snaps "40"
seta cl_timeNudge "0" //ta komenda przy wartości dodatniej powoduje laga, przy ujemnej pozwala zmniej- szyć znaczenie pingu, jednak kosztem mniej płynnego poruszania się modeli. Generalnie przez Internet gra się na wartości ujemnej, na lanie na wartości 0. Jeśli damy wartość ujemną, komendę seta cg_smoothClients "0" ustawmy na 0.
seta cg_smoothClients "0"
seta cl_packetdup "1" // should be 0 on lan

//
// GRAPHICS SETTINGS
//

seta cg_fov "115"
seta com_maxfps "120"
seta r_displayRefresh "120"


//
// HUD settings
//

seta cg_q3compScoreboard "1"
seta cg_statsscrolltime "0"
seta scr_conspeed "9999" //console appearance speed
seta cg_drawAttacker "1"
seta cg_drawAmmoWarning "0"
seta cg_drawTimer "1"
seta cg_simpleItems "0"


//
// PLAYER SETTINGS
//

// TODO competitive mode only
seta cg_enemyModel "tankjr/pm"
seta cg_enemyColors "2iii"
seta cg_forceModel "0"

seta name "^4nietaki"


seta model "klesk/flisk"
seta headmodel "klesk/flisk"


// seta model "sarge/pm"
seta team_model "tankjr/pm"
seta team_headmodel "tankjr/pm"
seta cg_enemyModel "tankjr/pm"
seta cg_enemycolors "2iii"
seta color1 "qqqq"
seta color2 "9" // rail color
seta cg_forceColors "1"
seta cg_teamRails "2"
seta color "7"
seta sex "male"

seta g_redTeam "Stroggs"
seta g_blueTeam "Pagans"

